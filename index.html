<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Finance</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>💰 Echo Finance</h1>
    <p>Personal Finance Tracker</p>
</header>

<div class="container">

<div class="card">
<h2>Total Balance</h2>
<h1 id="balance">₹0</h1>
</div>

<div class="grid">

<div class="card income">
<h3>Income</h3>
<h2 id="income">₹0</h2>
<button onclick="addIncome()">+ Add</button>
</div>

<div class="card expense">
<h3>Expense</h3>
<h2 id="expense">₹0</h2>
<button onclick="addExpense()">+ Add</button>
</div>

<div class="card investment">
<h3>Investment</h3>
<h2 id="investment">₹0</h2>
<button onclick="addInvestment()">+ Add</button>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
