<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Echo Finance</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#0f172a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<div class="logo">

💰 Echo Finance

</div>

<p class="subtitle">

Personal Finance Tracker

</p>

</header>

<section class="balance-card">

<h2>Total Balance</h2>

<h1 id="balance">₹0</h1>

</section>

<div class="cards">

<div class="card income">

<h3>Income</h3>

<h2 id="income">₹0</h2>

<button onclick="addIncome()">

+ Add Income

</button>

</div>

<div class="card expense">

<h3>Expense</h3>

<h2 id="expense">₹0</h2>

<button onclick="addExpense()">

+ Add Expense

</button>

</div>

<div class="card investment">

<h3>Investment</h3>

<h2 id="investment">₹0</h2>

<button onclick="addInvestment()">

+ Add Investment

</button>

</div>

</div>

<section class="history">

<h2>

Recent Transactions

</h2>

<ul id="historyList">

<li>

No Transactions Yet

</li>

</ul>

    </section>
    <div class="quick-actions">

<h2>Quick Actions</h2>

<div class="action-grid">

<button class="action-btn" onclick="addIncome()">
💰
<span>Income</span>
</button>

<button class="action-btn" onclick="addExpense()">
💸
<span>Expense</span>
</button>

<button class="action-btn" onclick="addInvestment()">
📈
<span>Investment</span>
</button>

<button class="action-btn" onclick="resetData()">
🗑️
<span>Reset</span>
</button>

</div>

</section>

<button class="fab" onclick="openModal()">
+
</button>

<div id="modal" class="modal">

<div class="modal-content">

<h2>Add Transaction</h2>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<select id="type">

<option value="income">Income</option>

<option value="expense">Expense</option>

<option value="investment">Investment</option>

</select>

<input
type="text"
id="note"
placeholder="Description">

<button onclick="saveTransaction()">

Save Transaction

</button>

<button onclick="closeModal()">

Cancel

</button>

</div>

</div>

<nav class="bottom-nav">

<div class="nav-item active">

🏠

<span>Home</span>

</div>

<div class="nav-item">

📊

<span>Reports</span>

</div>

<div class="nav-item">

💳

<span>Wallet</span>

</div>

<div class="nav-item">

⚙️

<span>Settings</span>

</div>

</nav>

<script src="script.js"></script>
<footer class="footer">

<p>
© 2026 Echo Finance
</p>

<p>
Made with ❤️ by Echoverse Studio
</p>

</footer>

</div>

</body>
    </html>
